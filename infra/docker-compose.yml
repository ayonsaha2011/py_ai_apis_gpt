services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  gateway:
    build:
      context: ..
      dockerfile: gateway-rs/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "8080:8080"
    environment:
      GATEWAY_BIND: 0.0.0.0:8080
      RUNTIME_BACKEND: docker
      TEXT_WORKER_URL: http://text-worker:8101
      LTX_WORKER_URL: http://ltx-worker:8102
    depends_on:
      - text-worker
      - ltx-worker

  text-worker:
    build:
      context: ..
      dockerfile: services/text-worker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    expose:
      - "8101"
    environment:
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ../models:/app/models
    depends_on:
      - qdrant
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ltx-worker:
    build:
      context: ..
      dockerfile: services/ltx-worker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    expose:
      - "8102"
    volumes:
      - ../models:/app/models
      - ../storage:/app/storage
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  qdrant_data:

services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://127.0.0.1:6333/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  gateway:
    build:
      context: ..
      dockerfile: gateway-rs/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "8080:8080"
    environment:
      GATEWAY_BIND: 0.0.0.0:8080
      RUNTIME_BACKEND: docker
      TEXT_WORKER_URL: http://text-worker:8101
      LTX_WORKER_URL: http://ltx-worker:8102
      SERVICE_LOG_DIR: /app/runtime/logs
    volumes:
      - ../runtime/logs:/app/runtime/logs
    depends_on:
      text-worker:
        condition: service_healthy
      ltx-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 20

  text-worker:
    build:
      context: ..
      dockerfile: services/text-worker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    expose:
      - "8101"
    environment:
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ../models:/app/models
      - ../runtime/logs:/app/runtime/logs
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ltx-worker:
    build:
      context: ..
      dockerfile: services/ltx-worker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    expose:
      - "8102"
    volumes:
      - ../models:/app/models
      - ../storage:/app/storage
      - ../runtime/logs:/app/runtime/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8102/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  qdrant_data:
